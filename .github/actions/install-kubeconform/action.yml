name: Install Kubeconform
description: Download and install Kubeconform to /usr/local/bin

runs:
  using: composite
  steps:
    - name: Install Kubeconform
      shell: bash
      env:
        KUBECONFORM_VERSION: '0.7.0'
        # SHA256 from https://github.com/yannh/kubeconform/releases/download/v0.7.0/CHECKSUMS
        KUBECONFORM_SHA256: 'c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3'
      run: |
        curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
          -o kubeconform.tar.gz
        echo "${KUBECONFORM_SHA256}  kubeconform.tar.gz" | sha256sum --check
        tar -xzf kubeconform.tar.gz -C /usr/local/bin kubeconform
        rm kubeconform.tar.gz
        kubeconform -v
