name: Install actionlint
description: Download and install actionlint to /usr/local/bin

runs:
  using: composite
  steps:
    - name: Install actionlint
      shell: bash
      env:
        ACTIONLINT_VERSION: '1.7.12'
        # SHA256 from https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_checksums.txt
        ACTIONLINT_SHA256: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
      run: |
        curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
          -o actionlint.tar.gz
        echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum --check
        tar -xzf actionlint.tar.gz -C /usr/local/bin actionlint
        rm actionlint.tar.gz
        actionlint -version
