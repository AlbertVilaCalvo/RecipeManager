name: CI - Web

on:
  pull_request:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/ci-web.yml
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/ci-web.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

permissions:
  contents: read

env:
  VITE_PORT: 3000 # Required by 'npm test' since it loads config from vite.config.ts
  VITE_API_BASE_URL: 'http://localhost:5000/api' # Required by 'npm test' since it loads httpClient.ts

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Build React app
        run: npm run build

  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run ESLint
        run: npm run lint

  tests:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
        # On GitHub runners CI=true is set, so 'npm test' runs once (not in watch mode).
        # See https://vitest.dev/guide/cli.html#vitest
      - name: Run tests
        run: npm test
