name: CI - Kubernetes

on:
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/**
      - .github/workflows/ci-kubernetes.yml
  push:
    branches:
      - main
    paths:
      - kubernetes/**
      - .github/workflows/ci-kubernetes.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Kustomize
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize
          kustomize version
      - name: Install Kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v
      - name: Validate manifests (dev)
        # -strict: fail on unknown fields in known schemas
        # -ignore-missing-schemas: skip (don't fail) CRDs without a known schema, e.g. ExternalSecret, SecretStore
        # -summary: print a summary line at the end
        run: kustomize build kubernetes/server/overlays/dev | kubeconform -strict -ignore-missing-schemas -summary -
      - name: Validate manifests (prod)
        run: kustomize build kubernetes/server/overlays/prod | kubeconform -strict -ignore-missing-schemas -summary -

  kube_linter:
    name: KubeLinter
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install KubeLinter
        run: |
          KUBE_LINTER_VERSION=0.7.2
          curl -sSL "https://github.com/stackrox/kube-linter/releases/download/v${KUBE_LINTER_VERSION}/kube-linter-linux.tar.gz" \
            | tar -xz -C /usr/local/bin
          kube-linter version
      - name: Run KubeLinter
        run: kube-linter lint kubernetes/
