name: Server (Node.js REST API)

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/server.yml
  pull_request:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/server.yml
    types:
      - opened
      - synchronize
      - closed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run Typecheck
        run: npx tsc --noEmit

  tests:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run tests
        run: npm test

  build_and_push_dev:
    name: Build & Push to ECR (Dev)
    needs: [eslint, typecheck, tests]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-ecr-push-dev'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
        run: |
          docker build --platform linux/amd64 -t recipe-manager-server:${{ steps.vars.outputs.image_tag }} .
          docker tag recipe-manager-server:${{ steps.vars.outputs.image_tag }} $ECR_REPOSITORY_URL:${{ steps.vars.outputs.image_tag }}
          docker push $ECR_REPOSITORY_URL:${{ steps.vars.outputs.image_tag }}

  update_dev:
    name: GitOps Kustomize (Dev)
    needs: [build_and_push_dev]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.8.1'

      - name: Update Kubernetes manifests
        run: |
          cd ../kubernetes/server/overlays/dev
          kustomize edit set image recipe-manager-api-server=${{ vars.ECR_REPOSITORY_URL }}:${{ needs.build_and_push_dev.outputs.image_tag }}

      - name: Commit and push GitOps changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ../kubernetes/server/overlays/dev/kustomization.yaml
          git commit -m "chore(gitops): update dev server image tag to ${{ needs.build_and_push_dev.outputs.image_tag }} [skip ci]"
          git push origin main

  build_and_push_prod:
    name: Build & Push to ECR (Prod)
    needs: [eslint, typecheck, tests, update_dev]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    environment:
      name: prod
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-ecr-push-prod'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
        run: |
          docker build --platform linux/amd64 -t recipe-manager-server:${{ steps.vars.outputs.image_tag }} .
          docker tag recipe-manager-server:${{ steps.vars.outputs.image_tag }} $ECR_REPOSITORY_URL:${{ steps.vars.outputs.image_tag }}
          docker push $ECR_REPOSITORY_URL:${{ steps.vars.outputs.image_tag }}

  update_prod:
    name: GitOps Kustomize (Prod)
    needs: [build_and_push_prod]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.8.1'

      - name: Update Kubernetes manifests
        run: |
          cd ../kubernetes/server/overlays/prod
          kustomize edit set image recipe-manager-api-server=${{ vars.ECR_REPOSITORY_URL }}:${{ needs.build_and_push_prod.outputs.image_tag }}

      - name: Commit and push GitOps changes
        run: |
          git pull --rebase origin main
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ../kubernetes/server/overlays/prod/kustomization.yaml
          git commit -m "chore(gitops): update prod server image tag to ${{ needs.build_and_push_prod.outputs.image_tag }} [skip ci]"
          git push origin main
