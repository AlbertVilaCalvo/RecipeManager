name: Server (Node.js API)

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/server.yml
  pull_request:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/server.yml
    types:
      - opened
      - synchronize
      - closed
  workflow_dispatch:

# Allow only one concurrent execution. When a new run is triggered, cancel any in-progress run.
# Note: kustomization.yaml image tag commits do not match the paths filter above, so they never
# re-trigger this workflow.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run tests
        run: npm test

  build_and_push_dev:
    name: Build & Push Docker image (dev)
    needs: [eslint, typecheck, test]
    # Run only on push to main or manually triggered, not on PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    environment:
      name: dev
    # Permissions needed to interact with GitHub's OIDC Token endpoint
    # https://docs.github.com/en/actions/reference/security/oidc#workflow-permissions-for-the-requesting-the-oidc-token
    permissions:
      id-token: write # Allows the job to request the JWT token from GitHub's OIDC provider
      contents: read # Allows the action to clone your repository code. Required for actions/checkout
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      ecr_repository_url: ${{ steps.vars.outputs.ecr_repository_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Set image tag and ECR URL
        id: vars
        # Use the first 7 characters of the commit SHA, matching the existing convention in kustomization.yaml
        run: |
          echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=${{ vars.ECR_REPOSITORY_URL }}" >> "$GITHUB_OUTPUT"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0 # https://github.com/aws-actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-ecr-push-dev'
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ vars.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.image_tag }} \
            .
          docker push ${{ vars.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.image_tag }}

  build_and_push_prod:
    name: Build & Push Docker image (prod)
    # Runs after the dev image tag is committed to main, preserving the dev→prod promotional hierarchy.
    # This job is also gated by GitHub environment protection rules on 'prod'.
    # Configure required reviewers at: Settings → Environments → prod → Required reviewers
    needs: update_image_tag_dev
    # Run only on push to main or manually triggered, not on PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    environment:
      name: prod
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      ecr_repository_url: ${{ steps.vars.outputs.ecr_repository_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Set image tag and ECR URL
        id: vars
        run: |
          echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=${{ vars.ECR_REPOSITORY_URL }}" >> "$GITHUB_OUTPUT"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-ecr-push-prod'
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ vars.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.image_tag }} \
            .
          docker push ${{ vars.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.image_tag }}

  update_image_tag_dev:
    name: Update image tag in kustomization (dev)
    needs: build_and_push_dev
    runs-on: ubuntu-24.04
    # No AWS access needed — only git operations
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch full history so the push doesn't reject due to diverged history
          fetch-depth: 0
      - name: Install kustomize
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize
          kustomize version
      - name: Configure git and pull latest
        working-directory: '.'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
      - name: Update image tag
        working-directory: kubernetes/server/overlays/dev
        run: |
          kustomize edit set image recipe-manager-api-server=${{ needs.build_and_push_dev.outputs.ecr_repository_url }}:${{ needs.build_and_push_dev.outputs.image_tag }}
      - name: Commit and push
        working-directory: '.'
        run: |
          git add kubernetes/server/overlays/dev/kustomization.yaml
          git commit -m "chore(k8s): update dev server image tag to ${{ needs.build_and_push_dev.outputs.image_tag }} [skip ci]"
          git push origin main

  update_image_tag_prod:
    name: Update image tag in kustomization (prod)
    needs: build_and_push_prod
    runs-on: ubuntu-24.04
    # No environment declaration needed — the gate was already applied on build_and_push_prod.
    # The ECR URL is sourced from that job's outputs, not from environment vars.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install kustomize
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize
          kustomize version
      - name: Configure git and pull latest
        working-directory: '.'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
      - name: Update image tag
        working-directory: kubernetes/server/overlays/prod
        run: |
          kustomize edit set image recipe-manager-api-server=${{ needs.build_and_push_prod.outputs.ecr_repository_url }}:${{ needs.build_and_push_prod.outputs.image_tag }}
      - name: Commit and push
        working-directory: '.'
        run: |
          git add kubernetes/server/overlays/prod/kustomization.yaml
          git commit -m "chore(k8s): update prod server image tag to ${{ needs.build_and_push_prod.outputs.image_tag }} [skip ci]"
          git push origin main
