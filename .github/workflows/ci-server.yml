name: CI - Server

on:
  pull_request:
    branches:
      - main
    paths:
      - server/**
      - trivy.yaml
      - .github/workflows/ci-server.yml
  push:
    branches:
      - main
    paths:
      - server/**
      - trivy.yaml
      - .github/workflows/ci-server.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Compile TypeScript
        run: npm run build

  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run ESLint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run tests
        run: npm test

  # Alternatively, we could use Dockle. Seems more feature rich, see
  # https://github.com/goodwithtech/dockle#checkpoints-comparison
  # We could also try Checkov: https://www.checkov.io/5.Policy%20Index/dockerfile.html
  hadolint:
    name: Hadolint (Dockerfile lint)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: server/Dockerfile

  npm_audit:
    name: npm audit (dependency scan)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Run npm audit
        run: npm audit --audit-level=high

  trivy_fs:
    name: Trivy (dependency scan)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'server/'
          scanners: 'vuln,secret,misconfig'
          trivy-config: trivy.yaml

  # Scans OS-level packages (Alpine apk) in the base image — something
  # 'trivy fs' cannot cover because it only looks at the package-lock.json.
  trivy_image:
    name: Trivy (Docker image security scan)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        # The platform flag is omitted here (defaults to the runner's native amd64)
        # since we only need the image locally for scanning, not for deployment.
        run: docker build -t recipe-manager-server:ci-scan .
      - name: Run Trivy image scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'image'
          scan-ref: 'recipe-manager-server:ci-scan'
          scanners: 'vuln'
          trivy-config: trivy.yaml
