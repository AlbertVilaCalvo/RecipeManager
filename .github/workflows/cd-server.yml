name: CD - Server

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - .github/actions/install-kustomize/**
      - .github/workflows/cd-server.yml
  workflow_dispatch:

# Allow only one concurrent deployment at a time.
# Unlike CI, we don't cancel in-progress runs to avoid leaving deployments in a partial state.
# In the future, if we have multiple services with a cd-*.yml workflow that push a commit
# to main, we can use a shared concurrency group across them to ensure the push succeeds. For
# example, use group: cd-deploy-${{ github.ref }}.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build_and_push_dev:
    name: Build & push Docker image to ECR (dev)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      ecr_repository_url: ${{ steps.vars.outputs.ecr_repository_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set image tag and ECR URL
        id: vars
        # GITHUB_SHA is set once by GitHub Actions at workflow start and never changes, making it safe
        # to use as the image tag across all jobs. Using 'git rev-parse --short HEAD' instead would be
        # unreliable: the update_image_tag_* jobs run 'git pull --rebase origin main' before editing
        # the kustomization file, which can shift HEAD to a newer commit if something else landed on
        # main in the meantime. That would produce a tag pointing to an image that was never built.
        run: |
          echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=${{ vars.ECR_REPOSITORY_URL }}" >> "$GITHUB_OUTPUT"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-ecr-push-dev'
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
      - name: Build, push and save Docker image
        working-directory: server
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ vars.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.image_tag }} \
            .
          docker push ${{ vars.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.image_tag }}
          docker save -o /tmp/server-image.tar ${{ vars.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.image_tag }}
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-image-${{ steps.vars.outputs.image_tag }}
          path: /tmp/server-image.tar
          retention-days: 1

  update_image_tag_dev:
    name: Update image tag in kustomization file (dev)
    needs: build_and_push_dev
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch all commit history to avoid "shallow update not allowed" errors when rebasing
          # and pushing back to the repository in the "Commit and push" step.
          fetch-depth: 0
      - name: Install Kustomize
        uses: ./.github/actions/install-kustomize
      - name: Configure git and pull latest
        # Pull before editing so that kustomize changes are applied on top of the latest main.
        # If another commit landed after this workflow started, rebasing avoids a rejected push
        # due to a non-fast-forward update.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
      - name: Update image tag
        working-directory: kubernetes/server/overlays/dev
        run: |
          kustomize edit set image recipe-manager-api-server=${{ needs.build_and_push_dev.outputs.ecr_repository_url }}:${{ needs.build_and_push_dev.outputs.image_tag }}
      - name: Commit and push
        run: |
          git add kubernetes/server/overlays/dev/kustomization.yaml
          git commit -m "chore(k8s): update dev server image tag to ${{ needs.build_and_push_dev.outputs.image_tag }} [skip ci]"
          git push origin main

  # Deployment to production is protected by environment protection rules.
  # Must configure required reviewers at GitHub Settings → Environments → prod → Required reviewers.
  # The environment gate ('environment: prod') is placed here rather than on update_image_tag_prod
  # so that nothing prod-related happens until a reviewer approves (no ECR push).
  # If the gate were on update_image_tag_prod instead, the prod image would already be in ECR before
  # anyone approved.
  # The exact same Docker image built for dev is promoted to prod via a GitHub artifact,
  # avoiding a second build and ensuring binary-identical images across environments.
  # We pass a GitHub artifact instead of pulling from the ECR repository because dev and
  # prod have separate ECR repositories, and the role AWS_GITHUB_ACTIONS_OIDC_ROLE_ARN_SERVER
  # only gives permissions to access to the environment repository. Also, dev and prod could
  # use different AWS accounts, so we'd need cross-account permissions.
  push_to_prod:
    name: Push Docker image to ECR (prod)
    # Enforce a dev→prod promotional hierarchy: the dev kustomization commit
    # must succeed before the prod pipeline even starts.
    needs: [build_and_push_dev, update_image_tag_dev]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: prod
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ needs.build_and_push_dev.outputs.image_tag }}
      ecr_repository_url: ${{ steps.vars.outputs.ecr_repository_url }}
    steps:
      - name: Set ECR URL
        id: vars
        run: |
          echo "ecr_repository_url=${{ vars.ECR_REPOSITORY_URL }}" >> "$GITHUB_OUTPUT"
      - name: Download Docker image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: server-image-${{ needs.build_and_push_dev.outputs.image_tag }}
          path: /tmp
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-ecr-push-prod'
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
      - name: Load, tag and push Docker image
        run: |
          docker load -i /tmp/server-image.tar
          docker tag \
            ${{ needs.build_and_push_dev.outputs.ecr_repository_url }}:${{ needs.build_and_push_dev.outputs.image_tag }} \
            ${{ vars.ECR_REPOSITORY_URL }}:${{ needs.build_and_push_dev.outputs.image_tag }}
          docker push ${{ vars.ECR_REPOSITORY_URL }}:${{ needs.build_and_push_dev.outputs.image_tag }}

  update_image_tag_prod:
    name: Update image tag in kustomization file (prod)
    needs: [build_and_push_dev, push_to_prod]
    runs-on: ubuntu-24.04
    # No 'environment:' declaration needed here. The approval gate was already enforced on
    # push_to_prod. Declaring an environment on this job would also require a second
    # manual approval, which is unnecessary. Because there is no environment context, this job
    # cannot access environment-scoped vars.*; instead the ECR URL and image tag are sourced
    # from push_to_prod's job outputs.
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install Kustomize
        uses: ./.github/actions/install-kustomize
      - name: Configure git and pull latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
      - name: Update image tag
        working-directory: kubernetes/server/overlays/prod
        run: |
          kustomize edit set image recipe-manager-api-server=${{ needs.push_to_prod.outputs.ecr_repository_url }}:${{ needs.push_to_prod.outputs.image_tag }}
      - name: Commit and push
        run: |
          git add kubernetes/server/overlays/prod/kustomization.yaml
          git commit -m "chore(k8s): update prod server image tag to ${{ needs.push_to_prod.outputs.image_tag }} [skip ci]"
          git push origin main
