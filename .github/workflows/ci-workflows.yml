name: CI - Workflows

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
      - .github/workflows/ci-workflows.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint (workflow syntax)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        uses: ./.github/actions/install-actionlint
      - name: Run actionlint
        run: actionlint
