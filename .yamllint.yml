---
# Relaxed yamllint config for Kubernetes manifests and GitHub Actions workflows.

extends: default

rules:
  line-length:
    max: 200
    level: warning

  # GitHub Actions uses 'on:' as a top-level key; allow it without quoting, along with other truthy values
  truthy:
    allowed-values: ['true', 'false', 'on', 'off', 'yes', 'no']
    check-keys: false

  comments:
    min-spaces-from-content: 1

  # Allow --- to have multiple documents in a single Kubernetes file
  document-start: disable
