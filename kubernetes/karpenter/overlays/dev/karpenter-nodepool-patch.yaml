apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
            - spot
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3a.small
            - t3.small
            - t3a.medium
            - t3.medium
            - t3a.large
            - t3.large
  limits:
    cpu: '50'
    memory: '50Gi'
  disruption:
    consolidateAfter: 1m
