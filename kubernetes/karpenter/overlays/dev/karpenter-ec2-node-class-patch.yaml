apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: recipe-manager-eks-node-role-dev
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: recipe-manager-eks-dev
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: recipe-manager-eks-dev
        kubernetes.io/cluster/recipe-manager-eks-dev: 'owned'
