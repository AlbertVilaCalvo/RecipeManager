apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-provisioner
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AlbertVilaCalvo/RecipeManager.git
    targetRevision: main
    path: kubernetes/karpenter/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
